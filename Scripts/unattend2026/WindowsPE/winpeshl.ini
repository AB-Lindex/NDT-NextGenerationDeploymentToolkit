; winpeshl.ini - NDT WinPE boot launcher
; Injected to Windows\System32\winpeshl.ini inside the WIM.
;
; Boot chain:
;   winpeshl.exe  ->  F8 pressed?  ->  cmd.exe (debug shell)
;                     otherwise   ->  [LaunchApps] in order:
;                                       1. wpeinit.exe    (DHCP, PnP drivers)
;                                       2. StartDeploy.cmd (WaitForNetwork -> install.ps1)
;
; MDT equivalent: winpeshl.ini [LaunchApps] bddrun.exe /bootstrap
;   bddrun.exe calls wpeinit internally then launches LiteTouch.wsf.
;   We replace bddrun.exe with explicit wpeinit + cmd.exe entries.
;
; NOTE: entries are run sequentially. wpeinit MUST be first so DHCP is
;       requested before StartDeploy.cmd calls wpeutil WaitForNetwork.
;
[LaunchApps]
%SYSTEMROOT%\System32\wpeinit.exe
%SYSTEMROOT%\System32\cmd.exe,/c X:\Deploy\StartDeploy.cmd
